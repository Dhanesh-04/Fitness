<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioForge // Clarity UI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        .input-clean { border: 1px solid #e2e8f0; background: #f8fafc; transition: all 0.2s; }
        .input-clean:focus { outline: none; border-color: #94a3b8; background: white; box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.1); }
    </style>
</head>
<body class="text-slate-900 min-h-screen pb-12 antialiased selection:bg-blue-100 selection:text-blue-900">

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 px-6 py-4 mb-8 shadow-sm">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">BioForge <span class="text-slate-400 font-normal">Workspace</span></h1>
            </div>
            <div class="flex items-center gap-6">
                <p class="text-sm font-medium text-slate-500" id="current-date-display"></p>
                <button onclick="tracker.resetDay()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold rounded-lg transition-colors">
                    Reset Day
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 space-y-8">
        
        <!-- MASTER SCHEDULE -->
        <section class="card p-6">
            <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Daily Schedule
            </h2>
            
            <div class="flex gap-3 mb-6">
                <input type="time" id="task-time" class="input-clean rounded-lg px-3 py-2 text-sm font-medium text-slate-700">
                <input type="text" id="task-desc" placeholder="E.g., Complete Physics NCERT Chapter 4..." class="input-clean flex-1 rounded-lg px-4 py-2 text-sm text-slate-900">
                <button onclick="tracker.addTask()" class="px-5 bg-slate-900 hover:bg-slate-800 text-white font-medium rounded-lg text-sm transition-colors shadow-sm">Add Task</button>
            </div>

            <div id="schedule-list" class="space-y-2"></div>
        </section>

        <!-- SPLIT MATRIX -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- ACADEMICS (STUDY) -->
            <section class="space-y-4">
                <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-2">Deep Work Sessions</h2>

                <div id="subject-container" class="space-y-4">
                    <!-- Physics -->
                    <div class="card p-5 hover:border-blue-200 transition-colors">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h3 class="text-base font-bold text-slate-900">Physics</h3>
                                <p class="text-xs text-slate-500 mt-0.5">Focus Tracker</p>
                            </div>
                            <div class="text-right">
                                <span class="text-3xl font-bold tracking-tight text-blue-600" id="physics-display">0.0</span>
                                <span class="text-xs font-medium text-slate-400 ml-1">hrs</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="tracker.toggleTimer('physics')" id="btn-physics" class="flex-1 py-2.5 bg-blue-50 hover:bg-blue-100 text-blue-700 font-semibold rounded-lg text-sm transition-colors border border-blue-200">Start Session</button>
                            <button onclick="tracker.manualAdd('physics', 0.5)" class="px-4 bg-slate-50 hover:bg-slate-100 text-slate-600 font-medium rounded-lg text-sm border border-slate-200 transition-colors">+30m</button>
                        </div>
                    </div>

                    <!-- Chemistry -->
                    <div class="card p-5 hover:border-indigo-200 transition-colors">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h3 class="text-base font-bold text-slate-900">Chemistry</h3>
                                <p class="text-xs text-slate-500 mt-0.5">Focus Tracker</p>
                            </div>
                            <div class="text-right">
                                <span class="text-3xl font-bold tracking-tight text-indigo-600" id="chemistry-display">0.0</span>
                                <span class="text-xs font-medium text-slate-400 ml-1">hrs</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="tracker.toggleTimer('chemistry')" id="btn-chemistry" class="flex-1 py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-semibold rounded-lg text-sm transition-colors border border-indigo-200">Start Session</button>
                            <button onclick="tracker.manualAdd('chemistry', 0.5)" class="px-4 bg-slate-50 hover:bg-slate-100 text-slate-600 font-medium rounded-lg text-sm border border-slate-200 transition-colors">+30m</button>
                        </div>
                    </div>

                    <!-- NEET -->
                    <div class="card p-5 hover:border-emerald-200 transition-colors">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h3 class="text-base font-bold text-slate-900">NEET Biology</h3>
                                <p class="text-xs text-slate-500 mt-0.5">Focus Tracker</p>
                            </div>
                            <div class="text-right">
                                <span class="text-3xl font-bold tracking-tight text-emerald-600" id="neet-display">0.0</span>
                                <span class="text-xs font-medium text-slate-400 ml-1">hrs</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="tracker.toggleTimer('neet')" id="btn-neet" class="flex-1 py-2.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-semibold rounded-lg text-sm transition-colors border border-emerald-200">Start Session</button>
                            <button onclick="tracker.manualAdd('neet', 0.5)" class="px-4 bg-slate-50 hover:bg-slate-100 text-slate-600 font-medium rounded-lg text-sm border border-slate-200 transition-colors">+30m</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- KINETIC MATRIX (FITNESS) -->
            <section class="space-y-4">
                <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-2">Physical Output</h2>

                <div class="grid grid-cols-2 gap-4">
                    <!-- Running -->
                    <div class="card p-5 flex flex-col justify-between">
                        <p class="text-sm font-bold text-slate-900">Track Run</p>
                        <div class="my-3">
                            <span class="text-3xl font-bold tracking-tight text-slate-800" id="running-display">0.0</span>
                            <span class="text-xs font-medium text-slate-400 ml-1">km</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <button onclick="tracker.increment('running', 1.0)" class="py-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-xs font-semibold rounded-md transition-colors">+1</button>
                            <button onclick="tracker.increment('running', 5.0)" class="py-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-xs font-semibold rounded-md transition-colors">+5</button>
                        </div>
                    </div>

                    <!-- Pushups -->
                    <div class="card p-5 flex flex-col justify-between">
                        <p class="text-sm font-bold text-slate-900">Push-ups</p>
                        <div class="my-3">
                            <span class="text-3xl font-bold tracking-tight text-slate-800" id="pushups-display">0</span>
                            <span class="text-xs font-medium text-slate-400 ml-1">reps</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <button onclick="tracker.increment('pushups', 20)" class="py-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-xs font-semibold rounded-md transition-colors">+20</button>
                            <button onclick="tracker.increment('pushups', 50)" class="py-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-xs font-semibold rounded-md transition-colors">+50</button>
                        </div>
                    </div>

                    <!-- Pull-ups -->
                    <div class="card p-5 flex flex-col justify-between">
                        <p class="text-sm font-bold text-slate-900">Pull-ups</p>
                        <div class="my-3">
                            <span class="text-3xl font-bold tracking-tight text-slate-800" id="pullups-display">0</span>
                            <span class="text-xs font-medium text-slate-400 ml-1">reps</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <button onclick="tracker.increment('pullups', 5)" class="py-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-xs font-semibold rounded-md transition-colors">+5</button>
                            <button onclick="tracker.increment('pullups', 10)" class="py-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-xs font-semibold rounded-md transition-colors">+10</button>
                        </div>
                    </div>

                    <!-- Squats -->
                    <div class="card p-5 flex flex-col justify-between">
                        <p class="text-sm font-bold text-slate-900">Squats</p>
                        <div class="my-3">
                            <span class="text-3xl font-bold tracking-tight text-slate-800" id="squats-display">0</span>
                            <span class="text-xs font-medium text-slate-400 ml-1">reps</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <button onclick="tracker.increment('squats', 25)" class="py-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-xs font-semibold rounded-md transition-colors">+25</button>
                            <button onclick="tracker.increment('squats', 50)" class="py-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-xs font-semibold rounded-md transition-colors">+50</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        class BioForgeEngine {
            constructor() {
                this.state = { 
                    physics: 0, chemistry: 0, neet: 0, 
                    running: 0, pushups: 0, pullups: 0, squats: 0, 
                    schedule: [] 
                };
                this.timers = {
                    physics: { active: false, intervalId: null, lastTimestamp: null },
                    chemistry: { active: false, intervalId: null, lastTimestamp: null },
                    neet: { active: false, intervalId: null, lastTimestamp: null }
                };
                this.init();
            }

            init() {
                document.getElementById('current-date-display').innerText = new Date().toLocaleDateString('en-US', {
                    weekday: 'long', month: 'short', day: 'numeric'
                });

                const localData = localStorage.getItem('bioforge_clarity_data');
                if (localData) {
                    try { this.state = { ...this.state, ...JSON.parse(localData) }; } 
                    catch(e) { console.error("Data error"); }
                }
                this.render();
            }

            saveState() {
                localStorage.setItem('bioforge_clarity_data', JSON.stringify(this.state));
                this.render();
            }

            increment(field, amount) {
                this.state[field] = Math.max(0, this.state[field] + amount);
                this.saveState();
            }

            manualAdd(field, hours) {
                this.state[field] = parseFloat((this.state[field] + hours).toFixed(2));
                this.saveState();
            }

            toggleTimer(subject) {
                const timerObj = this.timers[subject];
                const btn = document.getElementById(`btn-${subject}`);

                if (timerObj.active) {
                    clearInterval(timerObj.intervalId);
                    timerObj.active = false;
                    
                    btn.innerText = "Start Session";
                    btn.className = `flex-1 py-2.5 bg-${this.getColor(subject)}-50 hover:bg-${this.getColor(subject)}-100 text-${this.getColor(subject)}-700 font-semibold rounded-lg text-sm transition-colors border border-${this.getColor(subject)}-200`;
                } else {
                    Object.keys(this.timers).forEach(key => {
                        if (this.timers[key].active) this.toggleTimer(key);
                    });

                    timerObj.active = true;
                    timerObj.lastTimestamp = Date.now();
                    
                    timerObj.intervalId = setInterval(() => {
                        const now = Date.now();
                        const deltaMs = now - timerObj.lastTimestamp;
                        timerObj.lastTimestamp = now;
                        this.state[subject] = parseFloat((this.state[subject] + (deltaMs / 3600000)).toFixed(4));
                        document.getElementById(`${subject}-display`).innerText = parseFloat(this.state[subject]).toFixed(1);
                    }, 1000);

                    btn.innerText = "Stop Session";
                    btn.className = `flex-1 py-2.5 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-lg text-sm transition-colors border border-slate-900 shadow-sm`;
                }
                this.saveState();
            }

            getColor(subject) {
                if (subject === 'physics') return 'blue';
                if (subject === 'chemistry') return 'indigo';
                return 'emerald';
            }

            addTask() {
                const timeStr = document.getElementById('task-time').value;
                const descStr = document.getElementById('task-desc').value;
                if (!timeStr || !descStr) return;
                
                this.state.schedule.push({ id: Date.now(), time: timeStr, desc: descStr, done: false });
                this.state.schedule.sort((a, b) => a.time.localeCompare(b.time));
                
                document.getElementById('task-time').value = '';
                document.getElementById('task-desc').value = '';
                this.saveState();
            }

            toggleTask(id) {
                const task = this.state.schedule.find(t => t.id === id);
                if(task) { task.done = !task.done; this.saveState(); }
            }

            deleteTask(id) {
                this.state.schedule = this.state.schedule.filter(t => t.id !== id);
                this.saveState();
            }

            resetDay() {
                if(confirm("Start fresh? Hours and reps will be zeroed. Your schedule items will remain but be unchecked.")) {
                    Object.keys(this.timers).forEach(key => {
                        if (this.timers[key].active) this.toggleTimer(key);
                    });
                    this.state.physics = 0; this.state.chemistry = 0; this.state.neet = 0;
                    this.state.running = 0; this.state.pushups = 0; this.state.pullups = 0; this.state.squats = 0;
                    this.state.schedule.forEach(t => t.done = false);
                    this.saveState();
                }
            }

            render() {
                document.getElementById('physics-display').innerText = parseFloat(this.state.physics).toFixed(1);
                document.getElementById('chemistry-display').innerText = parseFloat(this.state.chemistry).toFixed(1);
                document.getElementById('neet-display').innerText = parseFloat(this.state.neet).toFixed(1);
                document.getElementById('running-display').innerText = parseFloat(this.state.running).toFixed(1);
                document.getElementById('pushups-display').innerText = parseInt(this.state.pushups);
                document.getElementById('pullups-display').innerText = parseInt(this.state.pullups);
                document.getElementById('squats-display').innerText = parseInt(this.state.squats);

                const list = document.getElementById('schedule-list');
                list.innerHTML = '';
                if(this.state.schedule.length === 0) {
                    list.innerHTML = '<p class="text-slate-500 text-sm py-2">No tasks added yet.</p>';
                } else {
                    this.state.schedule.forEach(task => {
                        const div = document.createElement('div');
                        div.className = `flex justify-between items-center p-3 rounded-lg border transition-all ${task.done ? 'bg-slate-50 border-slate-200' : 'bg-white border-slate-200 shadow-sm'}`;
                        div.innerHTML = `
                            <div class="flex items-center gap-4 cursor-pointer flex-1" onclick="tracker.toggleTask(${task.id})">
                                <div class="w-5 h-5 rounded border ${task.done ? 'bg-blue-500 border-blue-500 flex items-center justify-center' : 'border-slate-300'}">
                                    ${task.done ? '<svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                                </div>
                                <span class="font-medium text-sm ${task.done ? 'text-slate-400' : 'text-blue-600'} w-12">${task.time}</span>
                                <span class="text-sm ${task.done ? 'text-slate-400 line-through' : 'text-slate-700 font-medium'}">${task.desc}</span>
                            </div>
                            <button onclick="tracker.deleteTask(${task.id})" class="text-slate-400 hover:text-red-500 p-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        `;
                        list.appendChild(div);
                    });
                }
            }
        }
        const tracker = new BioForgeEngine();
    </script>
</body>
</html>
